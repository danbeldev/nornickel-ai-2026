server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: nornickel-ai-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nornickel_ai}
    username: ${SPRING_DATASOURCE_USERNAME:nornickel}
    password: ${SPRING_DATASOURCE_PASSWORD:nornickel}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:nornickel-api}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.github.danbel.api.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3:8b}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  storage:
    document-path: ${APP_DOCUMENT_STORAGE_PATH:./storage/documents}
  kafka:
    topics:
      document-processing-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PROCESSING_REQUESTED:document.processing.requested}
      document-publish-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PUBLISH_REQUESTED:document.publish.requested}
  graphrag:
    base-url: ${GRAPHRAG_BASE_URL:http://localhost:8000}
  ingestion:
    process-immediately: ${APP_INGESTION_PROCESS_IMMEDIATELY:true}
