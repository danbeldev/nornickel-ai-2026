server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: nornickel-ai-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nornickel_ai}
    username: ${SPRING_DATASOURCE_USERNAME:nornickel}
    password: ${SPRING_DATASOURCE_PASSWORD:nornickel}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:nornickel-api}
      auto-offset-reset: earliest
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        max.poll.interval.ms: ${SPRING_KAFKA_MAX_POLL_INTERVAL_MS:3600000}
        spring.json.trusted.packages: com.github.danbel.api.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  ai:
    model:
      chat: ollama
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: ${OLLAMA_PULL_MODEL_STRATEGY:when_missing}
        timeout: ${OLLAMA_PULL_TIMEOUT:10m}
        max-retries: ${OLLAMA_PULL_MAX_RETRIES:2}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:ornith:9b}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  storage:
    document-path: ${APP_DOCUMENT_STORAGE_PATH:./storage/documents}
    minio-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    minio-access-key: ${MINIO_ACCESS_KEY:minioadmin}
    minio-secret-key: ${MINIO_SECRET_KEY:minioadmin}
    minio-bucket: ${MINIO_BUCKET:documents}
  kafka:
    topics:
      document-processing-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PROCESSING_REQUESTED:document.processing.requested}
      document-publish-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PUBLISH_REQUESTED:document.publish.requested}
  graphrag:
    base-url: ${GRAPHRAG_BASE_URL:http://localhost:8000}
    connect-timeout-seconds: ${GRAPHRAG_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${GRAPHRAG_READ_TIMEOUT_SECONDS:3600}
  ingestion:
    process-immediately: ${APP_INGESTION_PROCESS_IMMEDIATELY:false}
