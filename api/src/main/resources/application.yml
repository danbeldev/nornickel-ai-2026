server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: nornickel-ai-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nornickel_ai}
    username: ${SPRING_DATASOURCE_USERNAME:nornickel}
    password: ${SPRING_DATASOURCE_PASSWORD:nornickel}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:nornickel-api}
      auto-offset-reset: earliest
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        max.poll.interval.ms: ${SPRING_KAFKA_MAX_POLL_INTERVAL_MS:3600000}
        spring.json.trusted.packages: com.github.danbel.api.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  servlet:
    multipart:
      max-file-size: ${APP_DOCUMENT_MAX_FILE_SIZE:10GB}
      max-request-size: ${APP_DOCUMENT_MAX_REQUEST_SIZE:10GB}

  ai:
    model:
      chat: openai
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    openai:
      base-url: ${YANDEX_SPRING_BASE_URL:https://ai.api.cloud.yandex.net/v1}
      api-key: ${YANDEX_API_KEY}
      project-id: ${YANDEX_FOLDER_ID}
      chat:
        options:
          model: ${YANDEX_CHAT_MODEL:gpt://${YANDEX_FOLDER_ID}/yandexgpt-5.1}
          temperature: ${YANDEX_CHAT_TEMPERATURE:0.2}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  storage:
    document-path: ${APP_DOCUMENT_STORAGE_PATH:./storage/documents}
    minio-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    minio-access-key: ${MINIO_ACCESS_KEY:minioadmin}
    minio-secret-key: ${MINIO_SECRET_KEY:minioadmin}
    minio-bucket: ${MINIO_BUCKET:documents}
  kafka:
    topics:
      document-processing-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PROCESSING_REQUESTED:document.processing.requested}
      document-publish-requested: ${APP_KAFKA_TOPIC_DOCUMENT_PUBLISH_REQUESTED:document.publish.requested}
  graphrag:
    base-url: ${GRAPHRAG_BASE_URL:http://localhost:8000}
    connect-timeout-seconds: ${GRAPHRAG_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${GRAPHRAG_READ_TIMEOUT_SECONDS:3600}
  query-pipeline:
    model: ${YANDEX_QUERY_MODEL:gpt://${YANDEX_FOLDER_ID}/yandexgpt-5-lite}
    long-query-words: ${QUERY_REWRITE_MIN_WORDS:18}
    long-query-characters: ${QUERY_REWRITE_MIN_CHARACTERS:140}
  web-search:
    enabled: ${WEB_SEARCH_ENABLED:true}
    base-url: ${YANDEX_SEARCH_BASE_URL:https://searchapi.api.cloud.yandex.net/v2/web/search}
    api-key: ${YANDEX_SEARCH_API_KEY:${YANDEX_API_KEY:}}
    folder-id: ${YANDEX_SEARCH_FOLDER_ID:${YANDEX_FOLDER_ID:}}
    result-limit: ${WEB_SEARCH_RESULT_LIMIT:5}
    max-content-characters: ${WEB_SEARCH_MAX_CONTENT_CHARACTERS:4000}
    max-download-bytes: ${WEB_SEARCH_MAX_DOWNLOAD_BYTES:1500000}
    request-timeout-seconds: ${WEB_SEARCH_REQUEST_TIMEOUT_SECONDS:20}
  ingestion:
    process-immediately: ${APP_INGESTION_PROCESS_IMMEDIATELY:false}
