services:
  web:
    build:
      context: ./web
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: nornickel-web
    depends_on:
      - api
    ports:
      - "3000:80"

  api:
    build:
      context: ./api
    container_name: nornickel-api
    depends_on:
      - postgres
      - kafka
      - neo4j
      - ollama
      - graphrag-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nornickel_ai
      SPRING_DATASOURCE_USERNAME: nornickel
      SPRING_DATASOURCE_PASSWORD: nornickel
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      GRAPHRAG_BASE_URL: http://graphrag-service:8000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      APP_DOCUMENT_STORAGE_PATH: /app/storage/documents
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      APP_INGESTION_PROCESS_IMMEDIATELY: "true"
    ports:
      - "8080:8080"
    volumes:
      - api-storage:/app/storage

  graphrag-service:
    build:
      context: ./graphrag-service
    container_name: nornickel-graphrag-service
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: nornickel-password
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - minio

  postgres:
    image: postgres:17
    container_name: nornickel-postgres
    environment:
      POSTGRES_DB: nornickel_ai
      POSTGRES_USER: nornickel
      POSTGRES_PASSWORD: nornickel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nornickel-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  kafka:
    image: bitnami/kafka:3.9
    container_name: nornickel-kafka
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka

  neo4j:
    image: neo4j:5.26-community
    container_name: nornickel-neo4j
    environment:
      NEO4J_AUTH: neo4j/nornickel-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  ollama:
    image: ollama/ollama:latest
    container_name: nornickel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  api-storage:
  postgres-data:
  minio-data:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  ollama-data:
