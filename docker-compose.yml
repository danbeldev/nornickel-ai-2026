services:
  web:
    build:
      context: ./web
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: nornickel-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3100}:80"

  api:
    build:
      context: ./api
    container_name: nornickel-api
    depends_on:
      - postgres
      - kafka
      - neo4j
      - graphrag-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nornickel_ai
      SPRING_DATASOURCE_USERNAME: nornickel
      SPRING_DATASOURCE_PASSWORD: nornickel
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      YANDEX_API_KEY: ${YANDEX_API_KEY:?YANDEX_API_KEY is required}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}
      YANDEX_SPRING_BASE_URL: ${YANDEX_SPRING_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      YANDEX_CHAT_MODEL: "gpt://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/${YANDEX_CHAT_MODEL_NAME:-yandexgpt-5.1}"
      YANDEX_QUERY_MODEL: "gpt://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/${YANDEX_QUERY_MODEL_NAME:-yandexgpt-5-lite}"
      YANDEX_SEARCH_BASE_URL: ${YANDEX_SEARCH_BASE_URL:-https://searchapi.api.cloud.yandex.net/v2/web/search}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_RESULT_LIMIT: ${WEB_SEARCH_RESULT_LIMIT:-5}
      GRAPHRAG_BASE_URL: http://graphrag-service:8000
      GRAPHRAG_CONNECT_TIMEOUT_SECONDS: ${GRAPHRAG_CONNECT_TIMEOUT_SECONDS:-5}
      GRAPHRAG_READ_TIMEOUT_SECONDS: ${GRAPHRAG_READ_TIMEOUT_SECONDS:-3600}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      APP_DOCUMENT_STORAGE_PATH: /app/storage/documents
      APP_DOCUMENT_MAX_FILE_SIZE: ${APP_DOCUMENT_MAX_FILE_SIZE:-10GB}
      APP_DOCUMENT_MAX_REQUEST_SIZE: ${APP_DOCUMENT_MAX_REQUEST_SIZE:-10GB}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://danbel.ru,http://localhost:3100,http://localhost:5173}
      APP_INGESTION_PROCESS_IMMEDIATELY: "false"
    ports:
      - "${API_PORT:-8180}:8080"
    volumes:
      - api-storage:/app/storage

  graphrag-service:
    build:
      context: ./graphrag-service
    container_name: nornickel-graphrag-service
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: nornickel-password
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      SPRING_API_BASE_URL: http://api:8080
      YANDEX_API_KEY: ${YANDEX_API_KEY:?YANDEX_API_KEY is required}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}
      YANDEX_OPENAI_BASE_URL: ${YANDEX_OPENAI_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      YANDEX_EMBEDDING_BASE_URL: ${YANDEX_EMBEDDING_BASE_URL:-https://llm.api.cloud.yandex.net/foundationModels/v1/textEmbedding}
      YANDEX_EXTRACTION_MODEL: "gpt://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/${YANDEX_EXTRACTION_MODEL_NAME:-yandexgpt-5.1}"
      YANDEX_VISION_MODEL: "gpt://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/${YANDEX_VISION_MODEL_NAME:-yandexgpt-5.1}"
      YANDEX_DOCUMENT_EMBEDDING_MODEL: "emb://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/text-embeddings-v2-doc"
      YANDEX_QUERY_EMBEDDING_MODEL: "emb://${YANDEX_FOLDER_ID:?YANDEX_FOLDER_ID is required}/text-embeddings-v2-query"
      GRAPHRAG_CHUNK_SIZE: ${GRAPHRAG_CHUNK_SIZE:-1400}
      GRAPHRAG_CHUNK_OVERLAP: ${GRAPHRAG_CHUNK_OVERLAP:-180}
      GRAPHRAG_MAX_VISUAL_FRAGMENTS: ${GRAPHRAG_MAX_VISUAL_FRAGMENTS:-20}
      GRAPHRAG_MAX_VISUAL_IMAGE_SIZE: ${GRAPHRAG_MAX_VISUAL_IMAGE_SIZE:-1600}
      GRAPHRAG_RETRIEVAL_TOP_K: ${GRAPHRAG_RETRIEVAL_TOP_K:-8}
      GRAPHRAG_FACT_RETRIEVAL_TOP_K: ${GRAPHRAG_FACT_RETRIEVAL_TOP_K:-3}
      GRAPHRAG_FACT_ENTITY_LIMIT: ${GRAPHRAG_FACT_ENTITY_LIMIT:-8}
      GRAPHRAG_FACT_PATH_LIMIT: ${GRAPHRAG_FACT_PATH_LIMIT:-6}
      GRAPHRAG_FACT_CONTEXT_CHARACTERS: ${GRAPHRAG_FACT_CONTEXT_CHARACTERS:-1600}
      GRAPHRAG_FILTERED_RETRIEVAL_TOP_K: ${GRAPHRAG_FILTERED_RETRIEVAL_TOP_K:-30}
      GRAPHRAG_ENTITY_RESOLUTION_THRESHOLD: ${GRAPHRAG_ENTITY_RESOLUTION_THRESHOLD:-0.92}
    ports:
      - "${GRAPHRAG_PORT:-8100}:8000"
    depends_on:
      - neo4j
      - minio

  postgres:
    image: postgres:17
    container_name: nornickel-postgres
    environment:
      POSTGRES_DB: nornickel_ai
      POSTGRES_USER: nornickel
      POSTGRES_PASSWORD: nornickel
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nornickel-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio-data:/data

  kafka:
    image: apache/kafka:4.3.1
    container_name: nornickel-kafka
    ports:
      - "${KAFKA_PORT:-19092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1

  neo4j:
    image: neo4j:5.26-community
    container_name: nornickel-neo4j
    environment:
      NEO4J_AUTH: neo4j/nornickel-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_HTTP_PORT:-17474}:7474"
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  api-storage:
  postgres-data:
  minio-data:
  kafka-data:
  neo4j-data:
  neo4j-logs:
